<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- displays site properly based on user's device -->

    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="./assets/images/favicon-32x32.png"
    />

    <title>Frontend Mentor | Blog preview card</title>

    <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
    <link rel="stylesheet" href="style.css" />
    
    <!-- <style>
    .attribution { font-size: 0.6875rem; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style> -->
  </head>
  <body>
    <!-- Learning

  Published 21 Dec 2023

  HTML & CSS foundations

  These languages are the backbone of every website, defining structure, content, and presentation.

  Greg Hooper -->
    <section>
      <div class="blog-preview-container">
        <div class="blog-preview-card">
          <figure class="blog-img">
            <img
              src="./assets/images/illustration-article.svg"
              alt="coding illustration "
            />
          </figure>
          <div class="blog-content">
            <div class="blog-category">Learning</div>
            <p class="Published-date">Published 21 Dec 2023</p>
            <p class="blog-title">HTML & CSS foundations</p>
            <p>
              These languages are the backbone of every website, defining
              structure, content, and presentation.
            </p>
          </div>
          <div class="author">
            <img src="./assets/images/image-avatar.webp" alt="" />
            <p class="Published-date">Greg Hooper</p>
          </div>
        </div>
      </div>
    </section>

    <!-- <footer>
      Challenge by
      <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>.
      Coded by <a href="#">Your Name Here</a>.
    </footer> -->
    <script src="script.js"></script>
  </body>
</html>
